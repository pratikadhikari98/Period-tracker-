<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a3a5c" id="themeMetaColor">
<meta name="description" content="श्री दुर्गा वैदिक संस्कृत विद्यापीठ — रियल-टाइम पिरेड ट्र्याकर">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="पिरेड ट्र्याकर">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>श्री दुर्गा वैदिक संस्कृत विद्यापीठ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;600;700;900&display=swap');

/* ════════════════════════════════
   THEME TOKENS
════════════════════════════════ */
:root {
  --primary: #1a3a5c;
  --primary-dark: #0d2640;
  --primary-mid: #2a5c8a;
  --accent: #e85d26;
  --gold: #f5a623;
  --gold-light: #ffd87a;
  --bg: #f0f4f8;
  --card-bg: #ffffff;
  --text: #1a2a3a;
  --muted: #6b7f94;
  --success: #2e7d32;
  --success-bg: #e8f4e8;
  --header-grad: linear-gradient(135deg, #1a3a5c 0%, #2a5c8a 100%);
  --clock-bg: #0d2640;
  --tab-border: #d0dce8;
  --tab-bg: white;
  --glass-bg: rgba(255,255,255,0.12);
  --glass-border: rgba(255,255,255,0.25);
  --glass-blur: blur(20px);
  --shadow-card: 0 2px 8px rgba(0,0,0,0.07);
  --radius: 14px;
}

/* ── LIQUID GLASS OCEAN ── */
[data-theme="glass-ocean"] {
  --primary: #0a4f6e;
  --primary-dark: #052a3d;
  --primary-mid: #1a7fa8;
  --accent: #00d4aa;
  --gold: #00e5ff;
  --gold-light: #80f0ff;
  --bg: #061e2e;
  --card-bg: rgba(10,79,110,0.35);
  --text: #e0f7ff;
  --muted: #7ec8e3;
  --success: #00d4aa;
  --success-bg: rgba(0,212,170,0.15);
  --header-grad: linear-gradient(135deg, rgba(5,42,61,0.85) 0%, rgba(10,79,110,0.75) 100%);
  --clock-bg: rgba(5,20,35,0.7);
  --tab-border: rgba(0,229,255,0.25);
  --tab-bg: rgba(10,79,110,0.4);
  --glass-bg: rgba(0,200,255,0.08);
  --glass-border: rgba(0,229,255,0.3);
  --shadow-card: 0 4px 24px rgba(0,100,150,0.25);
}
[data-theme="glass-ocean"] body { background: radial-gradient(ellipse at 30% 20%, #0a3d52 0%, #061e2e 60%); }
[data-theme="glass-ocean"] .card,
[data-theme="glass-ocean"] .teacher-card { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); }

/* ── LIQUID GLASS AURORA ── */
[data-theme="glass-aurora"] {
  --primary: #2d1b69;
  --primary-dark: #1a0d3d;
  --primary-mid: #5c3d99;
  --accent: #ff6b9d;
  --gold: #a78bfa;
  --gold-light: #ddd6fe;
  --bg: #0f0a1e;
  --card-bg: rgba(45,27,105,0.35);
  --text: #f0e6ff;
  --muted: #b794f4;
  --success: #68d391;
  --success-bg: rgba(104,211,145,0.15);
  --header-grad: linear-gradient(135deg, rgba(26,13,61,0.88) 0%, rgba(45,27,105,0.78) 100%);
  --clock-bg: rgba(15,10,30,0.75);
  --tab-border: rgba(167,139,250,0.3);
  --tab-bg: rgba(45,27,105,0.4);
  --glass-bg: rgba(140,100,255,0.08);
  --glass-border: rgba(167,139,250,0.35);
  --shadow-card: 0 4px 24px rgba(100,50,200,0.25);
}
[data-theme="glass-aurora"] body {
  background: radial-gradient(ellipse at 20% 10%, #3b1f6e 0%, #0f0a1e 50%),
              radial-gradient(ellipse at 80% 80%, #1e1040 0%, transparent 60%);
}
[data-theme="glass-aurora"] .card,
[data-theme="glass-aurora"] .teacher-card { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); }

/* ── LIQUID GLASS SUNSET ── */
[data-theme="glass-sunset"] {
  --primary: #7c2d12;
  --primary-dark: #450a0a;
  --primary-mid: #b45309;
  --accent: #fb923c;
  --gold: #fbbf24;
  --gold-light: #fde68a;
  --bg: #1c0a00;
  --card-bg: rgba(124,45,18,0.35);
  --text: #fff7ed;
  --muted: #fdba74;
  --success: #86efac;
  --success-bg: rgba(134,239,172,0.15);
  --header-grad: linear-gradient(135deg, rgba(69,10,10,0.88) 0%, rgba(124,45,18,0.78) 100%);
  --clock-bg: rgba(28,10,0,0.75);
  --tab-border: rgba(251,191,36,0.3);
  --tab-bg: rgba(124,45,18,0.4);
  --glass-bg: rgba(251,146,60,0.08);
  --glass-border: rgba(251,191,36,0.35);
  --shadow-card: 0 4px 24px rgba(180,80,0,0.25);
}
[data-theme="glass-sunset"] body {
  background: radial-gradient(ellipse at 70% 10%, #7c2d12 0%, #1c0a00 55%);
}
[data-theme="glass-sunset"] .card,
[data-theme="glass-sunset"] .teacher-card { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); }

/* ── LIQUID GLASS FOREST ── */
[data-theme="glass-forest"] {
  --primary: #14532d;
  --primary-dark: #052e16;
  --primary-mid: #166534;
  --accent: #4ade80;
  --gold: #86efac;
  --gold-light: #bbf7d0;
  --bg: #022c14;
  --card-bg: rgba(20,83,45,0.4);
  --text: #f0fdf4;
  --muted: #86efac;
  --success: #4ade80;
  --success-bg: rgba(74,222,128,0.15);
  --header-grad: linear-gradient(135deg, rgba(5,46,22,0.88) 0%, rgba(20,83,45,0.78) 100%);
  --clock-bg: rgba(2,20,10,0.78);
  --tab-border: rgba(134,239,172,0.3);
  --tab-bg: rgba(20,83,45,0.45);
  --glass-bg: rgba(74,222,128,0.08);
  --glass-border: rgba(134,239,172,0.35);
  --shadow-card: 0 4px 24px rgba(0,100,40,0.25);
}
[data-theme="glass-forest"] body {
  background: radial-gradient(ellipse at 40% 20%, #0f3d1e 0%, #022c14 60%);
}
[data-theme="glass-forest"] .card,
[data-theme="glass-forest"] .teacher-card { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); }

/* ── LIQUID GLASS SILVER (iOS Light) ── */
[data-theme="glass-silver"] {
  --primary: #3a3a3c;
  --primary-dark: #1c1c1e;
  --primary-mid: #636366;
  --accent: #007aff;
  --gold: #007aff;
  --gold-light: #64abff;
  --bg: #f2f2f7;
  --card-bg: rgba(255,255,255,0.72);
  --text: #1c1c1e;
  --muted: #8e8e93;
  --success: #34c759;
  --success-bg: rgba(52,199,89,0.12);
  --header-grad: linear-gradient(135deg, rgba(28,28,30,0.82) 0%, rgba(58,58,60,0.75) 100%);
  --clock-bg: rgba(15,15,18,0.72);
  --tab-border: rgba(0,0,0,0.1);
  --tab-bg: rgba(255,255,255,0.7);
  --glass-bg: rgba(255,255,255,0.55);
  --glass-border: rgba(255,255,255,0.8);
  --shadow-card: 0 2px 20px rgba(0,0,0,0.08);
}
[data-theme="glass-silver"] body { background: #f2f2f7; }
[data-theme="glass-silver"] .card,
[data-theme="glass-silver"] .teacher-card {
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--glass-border);
  box-shadow: 0 4px 24px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
}

/* ════════════════════════════════
   BASE STYLES
════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Serif Devanagari', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.4s ease, color 0.3s ease;
}

/* ── HEADER ── */
.header {
  background: var(--header-grad);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  color: white;
  padding: 14px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--glass-border);
}
.header-center { flex: 1; text-align: center; }
.school-name {
  font-size: 1.05rem;
  font-weight: 900;
  letter-spacing: 0.3px;
  line-height: 1.25;
  text-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.school-sub { font-size: 0.68rem; opacity: 0.7; margin-top: 2px; }

/* 3-dot menu button */
.menu-btn {
  width: 38px; height: 38px;
  border: none; background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 50%;
  border: 1px solid var(--glass-border);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 3.5px;
  flex-shrink: 0;
  transition: background 0.2s;
}
.menu-btn:active { background: rgba(255,255,255,0.2); }
.dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.9); }
.header-spacer { width: 38px; flex-shrink: 0; }

/* ── DROPDOWN MENU ── */
.dropdown-wrap { position: relative; }
.dropdown {
  display: none;
  position: absolute;
  top: 48px; right: 0;
  min-width: 200px;
  background: rgba(20,30,50,0.88);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 16px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.2);
  overflow: hidden;
  z-index: 999;
  animation: dropIn 0.18s ease;
}
@keyframes dropIn { from{opacity:0;transform:translateY(-8px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
.dropdown.open { display: block; }

.menu-section-label {
  padding: 10px 16px 6px;
  font-size: 0.62rem;
  font-weight: 700;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  letter-spacing: 1.2px;
}
.menu-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 16px;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  cursor: pointer;
  background: none; border: none; width: 100%;
  text-align: left;
  transition: background 0.15s;
  position: relative;
}
.menu-item:hover { background: rgba(255,255,255,0.08); }
.menu-item.active-theme::after {
  content: '✓';
  position: absolute; right: 16px;
  color: var(--gold);
  font-size: 0.9rem;
}
.menu-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 4px 0; }
.theme-dot {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  flex-shrink: 0;
}

/* ── INSTALL BANNER ── */
#installBanner {
  display: none;
  background: linear-gradient(90deg, #e85d26, #f5a623);
  color: white;
  padding: 9px 14px;
  font-size: 0.76rem;
  font-weight: 600;
  gap: 10px;
  align-items: center;
  justify-content: center;
}
#installBanner.show { display: flex; }
#installBanner button {
  background: white; color: #e85d26; border: none;
  border-radius: 20px; padding: 4px 14px;
  font-family: inherit; font-size: 0.74rem; font-weight: 700; cursor: pointer;
}

/* ── CLOCK ── */
.clock-bar {
  background: var(--clock-bg);
  backdrop-filter: blur(12px);
  color: white;
  text-align: center;
  padding: 11px 16px;
  display: flex; justify-content: center; align-items: center;
  gap: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  transition: background 0.4s;
}
.clock-inner { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.clock-time-row { display: flex; align-items: center; gap: 0; }
.clock-time {
  font-size: 2.3rem; font-weight: 900; color: var(--gold);
  letter-spacing: 2px; font-variant-numeric: tabular-nums; line-height: 1;
  text-shadow: 0 0 20px rgba(245,166,35,0.4);
  transition: color 0.3s;
}
.clock-seconds {
  font-size: 2.3rem; font-weight: 900;
  color: rgba(245,166,35,0.5);
  letter-spacing: 2px; font-variant-numeric: tabular-nums; line-height: 1;
}
.clock-ampm { font-size: 0.88rem; color: var(--gold-light); font-weight: 700; letter-spacing: 1px; margin-left: 8px; align-self: center; }
.clock-date { font-size: 0.73rem; opacity: 0.6; margin-top: 2px; }

/* ── CURRENT PERIOD BANNER ── */
.current-banner {
  margin: 13px 13px 0;
  border-radius: var(--radius);
  padding: 15px 17px;
  background: var(--header-grad);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  color: white;
  box-shadow: var(--shadow-card), 0 0 0 1px var(--glass-border);
  position: relative; overflow: hidden;
  transition: background 0.4s;
}
.current-banner::before {
  content: ''; position: absolute;
  top: -25px; right: -25px;
  width: 100px; height: 100px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
}
.banner-label { font-size: 0.65rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 3px; }
.banner-period { font-size: 1.4rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 12px rgba(245,166,35,0.3); }
.banner-time { font-size: 0.78rem; opacity: 0.78; margin-top: 2px; }
.banner-status { margin-top: 7px; font-size: 0.82rem; font-weight: 600; }
.progress-bar-wrap { margin-top: 10px; background: rgba(255,255,255,0.15); border-radius: 8px; height: 6px; overflow: hidden; }
.progress-bar { height: 6px; border-radius: 8px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); transition: width 1s linear; }

.no-period-banner {
  margin: 13px 13px 0;
  border-radius: var(--radius);
  padding: 15px 17px;
  background: var(--success-bg);
  border: 2px dashed var(--success);
  text-align: center;
  backdrop-filter: blur(12px);
}
.no-period-banner .icon { font-size: 1.7rem; }
.no-period-banner p { font-size: 0.86rem; color: var(--success); font-weight: 600; margin-top: 4px; line-height: 1.5; }

/* ── TABS ── */
.tabs {
  display: flex; gap: 7px;
  padding: 13px 13px 9px;
  overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 7px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--tab-border);
  background: var(--tab-bg);
  backdrop-filter: blur(10px);
  font-family: inherit; font-size: 0.78rem; font-weight: 600;
  cursor: pointer; white-space: nowrap; color: var(--muted);
  transition: all 0.2s;
}
.tab.active { background: var(--primary); color: white; border-color: var(--primary); }

/* ── SECTION TITLE ── */
.section-title {
  padding: 3px 13px 7px;
  font-size: 0.72rem; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px;
}

/* ── CARDS GRID ── */
.cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; padding: 0 13px 13px; }
.card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 12px 11px;
  box-shadow: var(--shadow-card);
  border-left: 4px solid #ccc;
  position: relative; transition: all 0.3s;
}
.card.active-now {
  border-left-color: var(--accent);
  box-shadow: 0 4px 16px rgba(232,93,38,0.15);
}
.card.active-now::after {
  content: '● LIVE';
  position: absolute; top: 7px; right: 8px;
  font-size: 0.56rem; font-weight: 700; color: var(--accent);
  letter-spacing: 0.5px; animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
.card-class { font-size: 0.62rem; color: var(--muted); font-weight: 700; margin-bottom: 3px; text-transform: uppercase; }
.card-subject { font-size: 0.86rem; font-weight: 700; color: var(--text); line-height: 1.25; }
.card-teacher { font-size: 0.74rem; font-weight: 600; margin-top: 4px; }
.card-period { font-size: 0.62rem; color: var(--muted); margin-top: 3px; }

/* ── TEACHER CARDS ── */
.teacher-card {
  background: var(--card-bg);
  border-radius: 12px;
  margin: 0 13px 9px;
  padding: 12px 14px;
  box-shadow: var(--shadow-card);
  display: flex; align-items: center; gap: 12px;
  transition: all 0.3s;
}
.teacher-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.95rem; font-weight: 900; color: white; flex-shrink: 0;
}
.teacher-name { font-size: 0.9rem; font-weight: 700; color: var(--text); }
.teacher-now { font-size: 0.74rem; color: var(--accent); font-weight: 600; margin-top: 2px; }
.teacher-where { font-size: 0.68rem; color: var(--muted); margin-top: 1px; }
.free-badge { margin-left: auto; background: var(--success-bg); color: var(--success); padding: 3px 9px; border-radius: 12px; font-size: 0.63rem; font-weight: 700; flex-shrink: 0; }
.busy-badge { margin-left: auto; background: rgba(230,81,0,0.12); color: #e65100; padding: 3px 9px; border-radius: 12px; font-size: 0.63rem; font-weight: 700; flex-shrink: 0; }

/* ── FULL TABLE ── */
.table-wrap { padding: 0 13px 20px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.69rem; background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-card); min-width: 560px; }
th { background: var(--primary); color: white; padding: 8px 5px; text-align: center; font-weight: 700; }
td { padding: 6px 4px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); vertical-align: middle; color: var(--text); }
td .subj { font-weight: 700; display: block; font-size: 0.7rem; }
td .tchr { color: var(--primary); font-size: 0.62rem; }
tr:hover td { background: rgba(0,0,0,0.02); }
.active-col { background: rgba(232,93,38,0.06) !important; }
.class-cell { background: var(--primary); color: white; font-weight: 900; font-size: 0.86rem; }
.break-cell { background: #c62828; color: white; font-weight: 700; font-size: 0.6rem; }

/* ── WIDGET SECTION ── */
.widget-section { padding: 0 13px 20px; }
.widget-title { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

.widget-preview {
  display: flex; flex-direction: column; gap: 10px;
  margin-bottom: 16px;
}

/* Small Widget */
.widget-sm {
  width: 155px; height: 155px;
  border-radius: 22px;
  padding: 14px;
  background: var(--header-grad);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--glass-border);
  box-shadow: 0 8px 32px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
  color: white;
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative; overflow: hidden;
}
.widget-sm::before {
  content: ''; position: absolute;
  top: -20px; right: -20px;
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(255,255,255,0.05);
}
.w-label { font-size: 0.58rem; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.8px; }
.w-period { font-size: 1.3rem; font-weight: 900; color: var(--gold); line-height: 1.1; margin-top: 2px; text-shadow: 0 0 10px rgba(245,166,35,0.4); }
.w-time { font-size: 0.62rem; opacity: 0.75; margin-top: 3px; }
.w-progress { height: 3px; border-radius: 4px; background: rgba(255,255,255,0.2); margin-top: 6px; }
.w-progress-fill { height: 3px; border-radius: 4px; background: var(--gold); }

/* Medium Widget */
.widget-md {
  width: 100%;
  max-width: 340px;
  height: 155px;
  border-radius: 22px;
  padding: 14px 16px;
  background: var(--header-grad);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--glass-border);
