<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;600;700;900&display=swap');

/* ════════════════════════════════
   THEME TOKENS
════════════════════════════════ */
:root {
  --primary: #1a3a5c;
  --primary-dark: #0d2640;
  --primary-mid: #2a5c8a;
  --accent: #e85d26;
  --gold: #f5a623;
  --gold-light: #ffd87a;
  --bg: #f0f4f8;
  --card-bg: #ffffff;
  --text: #1a2a3a;
  --muted: #6b7f94;
  --success: #2e7d32;
  --success-bg: #e8f4e8;
  --header-grad: linear-gradient(135deg, #1a3a5c 0%, #2a5c8a 100%);
  --clock-bg: #0d2640;
  --tab-border: #d0dce8;
  --tab-bg: white;
  --glass-bg: rgba(255,255,255,0.12);
  --glass-border: rgba(255,255,255,0.25);
  --glass-blur: blur(20px);
  --shadow-card: 0 2px 8px rgba(0,0,0,0.07);
  --radius: 14px;
}

/* ════════════════════════════════
   BASE STYLES
════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Serif Devanagari', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.4s ease, color 0.3s ease;
}

/* ── PHOTO HEADER ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  width: 100%;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  background: var(--primary-dark);
}
.header-photo {
  width: 100%;
  display: block;
  max-height: 200px;
  object-fit: cover;
  object-position: center;
}
.header-placeholder { display: none; }
.header-change-btn { display: none; }
#photoInput { display: none; }

.header-spacer { display: none; }

/* ── INSTALL BANNER ── */
#installBanner {
  display: none;
  background: linear-gradient(90deg, #e85d26, #f5a623);
  color: white;
  padding: 9px 14px;
  font-size: 0.76rem;
  font-weight: 600;
  gap: 10px;
  align-items: center;
  justify-content: center;
}
#installBanner.show { display: flex; }
#installBanner button {
  background: white; color: #e85d26; border: none;
  border-radius: 20px; padding: 4px 14px;
  font-family: inherit; font-size: 0.74rem; font-weight: 700; cursor: pointer;
}

/* ── CLOCK ── */
.clock-bar {
  background: transparent;
  color: var(--text);
  text-align: center;
  padding: 18px 16px 10px;
  display: flex; justify-content: center; align-items: center;
}
.clock-inner { display: flex; flex-direction: column; align-items: center; gap: 0; width: 100%; }
.analog-clock-wrap {
  position: relative;
  width: 170px; height: 170px;
  margin: 0 auto 6px;
}
.analog-clock-svg {
  width: 170px; height: 170px;
  filter: drop-shadow(0 6px 24px rgba(26,58,92,0.22));
}
.clock-digital-row {
  display: flex; align-items: baseline; gap: 2px;
  margin-top: 2px;
}
.clock-time {
  font-size: 1.55rem; font-weight: 900; color: var(--primary);
  letter-spacing: 2px; font-variant-numeric: tabular-nums; line-height: 1;
}
.clock-seconds {
  font-size: 1rem; font-weight: 700; color: var(--accent);
  letter-spacing: 1px; font-variant-numeric: tabular-nums; line-height: 1;
}
.clock-ampm {
  font-size: 0.78rem; font-weight: 700; color: var(--muted);
  margin-left: 4px; align-self: center;
}
.clock-date { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }



/* ── CURRENT PERIOD BANNER ── */
.current-banner {
  margin: 13px 13px 0;
  border-radius: var(--radius);
  padding: 15px 17px;
  background: var(--header-grad);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  color: white;
  box-shadow: var(--shadow-card), 0 0 0 1px var(--glass-border);
  position: relative; overflow: hidden;
  transition: background 0.4s;
}
.current-banner::before {
  content: ''; position: absolute;
  top: -25px; right: -25px;
  width: 100px; height: 100px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
}
.banner-label { font-size: 0.65rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 3px; }
.banner-period { font-size: 1.4rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 12px rgba(245,166,35,0.3); }
.banner-time { font-size: 0.78rem; opacity: 0.78; margin-top: 2px; }
.banner-status { margin-top: 7px; font-size: 0.82rem; font-weight: 600; }
.progress-bar-wrap { margin-top: 10px; background: rgba(255,255,255,0.15); border-radius: 8px; height: 6px; overflow: hidden; }
.progress-bar { height: 6px; border-radius: 8px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); transition: width 1s linear; }

.no-period-banner {
  margin: 13px 13px 0;
  border-radius: var(--radius);
  padding: 15px 17px;
  background: var(--success-bg);
  border: 2px dashed var(--success);
  text-align: center;
  backdrop-filter: blur(12px);
}
.no-period-banner .icon { font-size: 1.7rem; }
.no-period-banner p { font-size: 0.86rem; color: var(--success); font-weight: 600; margin-top: 4px; line-height: 1.5; }
.khaja-today {
  margin-top: 10px;
  padding: 8px 14px;
  background: rgba(255,255,255,0.55);
  border-radius: 10px;
  display: inline-block;
  font-size: 0.84rem;
  color: var(--text);
  font-weight: 600;
}
.khaja-today strong { color: var(--accent); font-size: 0.95rem; }

/* ── TABS ── */
.tabs {
  display: flex; gap: 7px;
  padding: 13px 13px 9px;
  overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 7px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--tab-border);
  background: var(--tab-bg);
  backdrop-filter: blur(10px);
  font-family: inherit; font-size: 0.78rem; font-weight: 600;
  cursor: pointer; white-space: nowrap; color: var(--muted);
  transition: all 0.2s;
}
.tab.active { background: var(--primary); color: white; border-color: var(--primary); }

/* ── SECTION TITLE ── */
.section-title {
  padding: 3px 13px 7px;
  font-size: 0.72rem; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px;
}

/* ── CARDS GRID ── */
.cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; padding: 0 13px 13px; }
.card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 12px 11px;
  box-shadow: var(--shadow-card);
  border-left: 4px solid #ccc;
  position: relative; transition: all 0.3s;
}
.card.active-now {
  border-left-color: var(--accent);
  box-shadow: 0 4px 16px rgba(232,93,38,0.15);
}
.card.active-now::after {
  content: '● LIVE';
  position: absolute; top: 7px; right: 8px;
  font-size: 0.56rem; font-weight: 700; color: var(--accent);
  letter-spacing: 0.5px; animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
.card-class { font-size: 0.62rem; color: var(--muted); font-weight: 700; margin-bottom: 3px; text-transform: uppercase; }
.card-subject { font-size: 0.86rem; font-weight: 700; color: var(--text); line-height: 1.25; }
.card-teacher { font-size: 0.74rem; font-weight: 600; margin-top: 4px; }
.card-period { font-size: 0.62rem; color: var(--muted); margin-top: 3px; }

/* ── TEACHER CARDS ── */
.teacher-card {
  background: var(--card-bg);
  border-radius: 12px;
  margin: 0 13px 9px;
  padding: 12px 14px;
  box-shadow: var(--shadow-card);
  display: flex; align-items: center; gap: 12px;
  transition: all 0.3s;
}
.teacher-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.95rem; font-weight: 900; color: white; flex-shrink: 0;
}
.teacher-name { font-size: 0.9rem; font-weight: 700; color: var(--text); }
.teacher-now { font-size: 0.74rem; color: var(--accent); font-weight: 600; margin-top: 2px; }
.teacher-where { font-size: 0.68rem; color: var(--muted); margin-top: 1px; }
.free-badge { margin-left: auto; background: var(--success-bg); color: var(--success); padding: 3px 9px; border-radius: 12px; font-size: 0.63rem; font-weight: 700; flex-shrink: 0; }
.busy-badge { margin-left: auto; background: rgba(230,81,0,0.12); color: #e65100; padding: 3px 9px; border-radius: 12px; font-size: 0.63rem; font-weight: 700; flex-shrink: 0; }

/* ── FULL TABLE ── */
.table-wrap { padding: 0 13px 20px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.69rem; background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-card); min-width: 560px; }
th { background: var(--primary); color: white; padding: 8px 5px; text-align: center; font-weight: 700; }
td { padding: 6px 4px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); vertical-align: middle; color: var(--text); }
td .subj { font-weight: 700; display: block; font-size: 0.7rem; }
td .tchr { color: var(--primary); font-size: 0.62rem; }
tr:hover td { background: rgba(0,0,0,0.02); }
.active-col { background: rgba(232,93,38,0.06) !important; }
.class-cell { background: var(--primary); color: white; font-weight: 900; font-size: 0.86rem; }
.break-cell { background: #c62828; color: white; font-weight: 700; font-size: 0.6rem; }



.hidden { display: none !important; }

/* OVERLAY */

.footer { text-align: center; padding: 18px 16px 32px; color: var(--muted); font-size: 0.68rem; line-height: 1.8; }
.pwa-hint { font-size: 0.64rem; color: var(--muted); opacity: 0.6; margin-top: 3px; }
</style>
</head>

<script>
// ── DATA ──
const periods = [
  { name:'प्रथम',   label:'१', start:'10:10', end:'11:00' },
  { name:'द्वितीय', label:'२', start:'11:00', end:'11:45' },
  { name:'तृतीय',   label:'३', start:'11:45', end:'12:30' },
  { name:'चतुर्थ',  label:'४', start:'12:30', end:'13:15' },
  { name:'पञ्चम',   label:'५', start:'13:15', end:'13:55' },
  { name:'षष्ठ',    label:'६', start:'14:40', end:'15:20' },
  { name:'सप्तम',   label:'७', start:'15:20', end:'16:00' },
];
const BREAK_START='13:55', BREAK_END='14:40';

// ── दैनिक खाजा विवरण (श्री दुर्गा वैदिक संस्कृत विद्यापीठ) ──
const khajaList = {
  0:'खीर',                       // आइतवार
  1:'आलुचना',                    // सोमवार
  2:'हलुवा',                     // मंगलवार
  3:'आलुमटर',                    // बुधवार
  4:'चिउरा पुलाव',                // बिहीवार
  5:'चना ग्रेवीसँग चिउरा',          // शुक्रवार
  6:'पकौडा चटनी',                 // शनिवार
};

const timetable = {
  '६':  [['अंग्रेजी','जमुना'],['संस्कृत भाषा','ऋषि'],['कर्मकाण्ड','नारायण'],['वेद','प्रतीक'],['गणित','सम्पदा'],['संस्कृत व्याकरण','प्रतीक'],['नेपाली','जमुना']],
  '७':  [['वेद','प्रतीक'],['नेपाली','माया'],['संस्कृत व्याकरण','प्रतीक'],['अंग्रेजी','कल्पना'],['संस्कृत भाषा','ऋषि'],['गणित','सम्पदा'],['कर्मकाण्ड','नारायण']],
  '८':  [['गणित','सम्पदा'],['कर्मकाण्ड','नारायण'],['अंग्रेजी','जमुना'],['नेपाली','ऋषि'],['संस्कृत व्याकरण','प्रतीक'],['संस्कृत भाषा','जगन्नाथ'],['वेद','गोपाल']],
  '९':  [['कर्मकाण्ड','नारायण'],['संस्कृत भाषा व्याकरण','कृष्ण'],['नेपाली','ऋषि'],['गणित','लक्ष्मण'],['अंग्रेजी','जमुना'],['वेद','गोपाल'],['संस्कृत व्याकरण','जगन्नाथ']],
  '१०': [['अंग्रेजी','कल्पना'],['गणित','लक्ष्मण'],['वेद','गोपाल'],['कर्मकाण्ड','नारायण'],['संस्कृत व्याकरण','जगन्नाथ'],['नेपाली','माया'],['संस्कृत भाषा व्याकरण','कृष्ण']],
  '११': [['संस्कृत व्याकरण','जगन्नाथ'],['ज्योतिष','गोपाल'],['संस्कृत भाषा व्याकरण','कृष्ण'],['अंग्रेजी','जमुना'],['सामाजिक','कल्पना'],['नेपाली','ऋषि'],['-','-']],
  '१२': [['संस्कृत भाषा व्याकरण','कृष्ण'],['अंग्रेजी','कल्पना'],['संस्कृत व्याकरण','जगन्नाथ'],['ज्योतिष','गोपाल'],['नेपाली','माया'],['सामाजिक','कल्पना'],['-','-']],
};
const classes = Object.keys(timetable);

const teacherColors = {
  'प्रतीक':'#1565C0','जमुना':'#6A1B9A','ऋषि':'#00695C',
  'नारायण':'#E65100','लक्ष्मण':'#AD1457','सम्पदा':'#00838F','माया':'#558B2F',
  'कल्पना':'#4527A0','जगन्नाथ':'#0277BD','गोपाल':'#2E7D32','कृष्ण':'#6D4C41',
};

// ── HELPERS ──
const toMin = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };
const getPIdx = nm => { for(let i=0;i<periods.length;i++) if(nm>=toMin(periods[i].start)&&nm<toMin(periods[i].end)) return i; return -1; };
const isBreak = nm => nm>=toMin(BREAK_START)&&nm<toMin(BREAK_END);
const isSchool = nm => nm>=toMin('10:10')&&nm<toMin('16:00');
const getProg  = (nm,i) => { const s=toMin(periods[i].start),e=toMin(periods[i].end); return Math.min(100,Math.round(((nm-s)/(e-s))*100)); };

// ── NEPALI DIGITS ──
const NP = n => String(n).replace(/[0-9]/g, d => '०१२३४५६७८९'[+d]);
const pad2NP = n => NP(String(n).padStart(2,'0'));

// ── CLOCK ──
// ── ANALOG CLOCK ──
(function(){
  const NS='http://www.w3.org/2000/svg';
  // tick marks बनाउने
  const tg = document.getElementById('tickMarks');
  const allNums=['१२','१','२','३','४','५','६','७','८','९','१०','११'];
  if(tg){
    // ── 60 minute ticks ──
    for(let i=0;i<60;i++){
      const rad = i*6*Math.PI/180;
      const isHour = i%5===0;
      const isQuarter = i%15===0;
      const r1=72;
      const r2 = isQuarter?62 : isHour?65 : 69;
      const sw = isQuarter?2.5 : isHour?1.8 : 0.8;
      const op = isQuarter?'0.7' : isHour?'0.5' : '0.22';
      const x1=85+r1*Math.sin(rad), y1=85-r1*Math.cos(rad);
      const x2=85+r2*Math.sin(rad), y2=85-r2*Math.cos(rad);
      const line=document.createElementNS(NS,'line');
      line.setAttribute('x1',x1); line.setAttribute('y1',y1);
      line.setAttribute('x2',x2); line.setAttribute('y2',y2);
      line.setAttribute('stroke','#1a3a5c');
      line.setAttribute('stroke-width',sw);
      line.setAttribute('opacity',op);
      line.setAttribute('stroke-linecap','round');
      tg.appendChild(line);
    }
    // ── 1 देखि 12 सबै नम्बर ──
    for(let i=0;i<12;i++){
      const rad = i*30*Math.PI/180;
      const isQuarter = i%3===0;
      const nr = isQuarter ? 52 : 54;
      const nx=85+nr*Math.sin(rad), ny=85-nr*Math.cos(rad);
      const num=document.createElementNS(NS,'text');
      num.setAttribute('x',nx); num.setAttribute('y',ny);
      num.setAttribute('text-anchor','middle');
      num.setAttribute('dominant-baseline','central');
      num.setAttribute('font-size', isQuarter?'9':'7.5');
      num.setAttribute('font-weight', isQuarter?'700':'600');
      num.setAttribute('fill','#1a3a5c');
      num.setAttribute('opacity', isQuarter?'0.75':'0.5');
      num.setAttribute('font-family','Noto Serif Devanagari,serif');
      num.textContent=allNums[i];
      tg.appendChild(num);
    }
  }

  function setRotation(id, deg){
    const el=document.getElementById(id);
    if(!el) return;
    el.setAttribute('transform','rotate('+deg+',85,85)');
  }

  
  window._analogUpdate = function(h12,m,s){
    const sDeg  = s*6;
    const mDeg  = m*6 + s*0.1;
    const hDeg  = (h12%12)*30 + m*0.5;
    setRotation('hourHand',   hDeg);
    setRotation('minuteHand', mDeg);
    setRotation('secondHand', sDeg);
  };
})();

function updateClock() {
  const now = new Date();
  const h24 = now.getHours();
  const m   = now.getMinutes();
  const s   = now.getSeconds();
  const ampm = h24<12?'बिहान':h24<17?'दिउँसो':'बेलुकी';
  const h12  = h24%12===0?12:h24%12;

  if(window._analogUpdate) _analogUpdate(h12,m,s);

  document.getElementById('clockHM').textContent   = pad2NP(h12)+':'+pad2NP(m);
  document.getElementById('clockSec').textContent  = ':'+pad2NP(s);
  document.getElementById('clockAmPm').textContent = ampm;

  const days=['आइतबार','सोमबार','मंगलबार','बुधबार','बिहिबार','शुक्रबार','शनिबार'];
  const months=['जनवरी','फेब्रुअरी','मार्च','अप्रिल','मे','जून','जुलाई','अगस्ट','सेप्टेम्बर','अक्टोबर','नोभेम्बर','डिसेम्बर'];
  document.getElementById('dateDisplay').textContent=days[now.getDay()]+', '+pad2NP(now.getDate())+' '+months[now.getMonth()]+' '+pad2NP(now.getFullYear());

  const nm=h24*60+m;
  updateAll(nm, pad2NP(h12)+':'+pad2NP(m), ampm);
}

// time string "10:10" → "१०:१०"
const npTime = t => NP(t);

// ── MAIN UPDATE ──
function updateAll(nm, timeStr, ampm) {
  const pIdx=getPIdx(nm);
  const el=document.getElementById('currentBanner');

  if(pIdx>=0){
    const p=periods[pIdx], prog=getProg(nm,pIdx), rem=toMin(p.end)-nm;
    el.innerHTML=`<div class="current-banner">
      <div class="banner-label">अहिले चलिरहेको पिरेड</div>
      <div class="banner-period">${p.name} पिरेड (${p.label})</div>
      <div class="banner-time">⏰ ${npTime(p.start)} – ${npTime(p.end)} बजे</div>
      <div class="banner-status">⏳ ${NP(rem)} मिनेट बाँकी छ</div>
      <div class="progress-bar-wrap"><div class="progress-bar" style="width:${prog}%"></div></div>
    </div>`;
  } else if(isBreak(nm)){
    const khaja = khajaList[new Date().getDay()] || '—';
    el.innerHTML=`<div class="no-period-banner"><div class="icon">🍽️</div><p>मध्यान्तर (Lunch Break)<br>१३:५५ – १४:४० बजे</p><div class="khaja-today">आजको खाजा: <strong>${khaja}</strong></div></div>`;
  } else if(isSchool(nm)){
    el.innerHTML=`<div class="no-period-banner"><div class="icon">🔔</div><p>पिरेड परिवर्तन हुँदैछ...</p></div>`;
  } else {
    el.innerHTML=`<div class="no-period-banner"><div class="icon">🌙</div><p>विद्यालय समय छैन<br>बिहान १०:१० देखि बेलुकी ४:०० बजेसम्म</p></div>`;
  }

  renderClassView(pIdx);
  renderTeacherView(pIdx);
  renderFullTable(pIdx);
}

// ── WIDGET UPDATE ──

// ── CLASS VIEW ──
function renderClassView(pIdx) {
  const c=document.getElementById('classCards'), ti=document.getElementById('classViewTitle');
  if(pIdx<0){ ti.textContent='हालको पिरेड — कक्षा अनुसार'; c.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:24px 16px;color:var(--muted);font-size:0.84rem;">अहिले पिरेड चलिरहेको छैन</div>'; return; }
  ti.textContent=`${periods[pIdx].name} पिरेड — कक्षा अनुसार`;
  c.innerHTML=classes.map(cls=>{
    const [s,t]=timetable[cls][pIdx];
    if(s==='-') return '';
    const col=teacherColors[t]||'#555';
    return `<div class="card active-now" style="border-left-color:${col}">
      <div class="card-class">कक्षा ${cls}</div>
      <div class="card-subject">${s}</div>
      <div class="card-teacher" style="color:${col}">👨‍🏫 ${t}</div>
      <div class="card-period">${npTime(periods[pIdx].start)}–${npTime(periods[pIdx].end)}</div>
    </div>`;
  }).join('');
}

// ── TEACHER VIEW ──
function renderTeacherView(pIdx) {
  const c=document.getElementById('teacherCards');
  const all=[...new Set(Object.values(timetable).flat().map(([,t])=>t).filter(t=>t&&t!=='-'))].sort();
  const busy=[];
  if(pIdx>=0) classes.forEach(cls=>{ const [s,t]=timetable[cls][pIdx]; if(t&&t!=='-') busy.push({teacher:t,subj:s,cls}); });
  c.innerHTML=all.map(t=>{
    const col=teacherColors[t]||'#555', b=busy.find(x=>x.teacher===t);
    return `<div class="teacher-card">
      <div class="teacher-avatar" style="background:${col}">${t.charAt(0)}</div>
      <div>
        <div class="teacher-name">${t}</div>
        ${b?`<div class="teacher-now">📖 ${b.subj}</div><div class="teacher-where">कक्षा ${b.cls}</div>`:`<div style="font-size:0.68rem;color:var(--muted);margin-top:2px;">खाली समय</div>`}
      </div>
      ${b?'<span class="busy-badge">व्यस्त</span>':'<span class="free-badge">खाली</span>'}
    </div>`;
  }).join('');
}

// ── FULL TABLE ──
function renderFullTable(pIdx) {
  const tb=document.getElementById('fullTable');
  let h='<thead><tr><th>कक्षा</th>';
  periods.forEach((p,i)=>{
    const a=i===pIdx;
    h+=`<th${a?' style="background:#e85d26"':''}>${p.name}<br><small style="font-weight:400;opacity:0.8">${npTime(p.start)}–${npTime(p.end)}</small></th>`;
    if(i===4) h+=`<th class="break-cell">मध्यान्तर</th>`;
  });
  h+='</tr></thead><tbody>';
  classes.forEach(cls=>{
    h+=`<tr><td class="class-cell">क-${cls}</td>`;
    timetable[cls].forEach(([s,t],i)=>{
      const a=i===pIdx, col=teacherColors[t]||'#333';
      h+=`<td${a?' class="active-col"':''}><span class="subj"${a?` style="color:${col}"`:''}>${s}</span><span class="tchr"${a?` style="color:${col};font-weight:700"`:''}>${t!=='-'?t:''}</span></td>`;
      if(i===4) h+=`<td style="background:rgba(232,93,38,0.08);color:#bf360c;font-size:0.6rem;font-weight:700">मध्यान्तर</td>`;
    });
    h+='</tr>';
  });
  h+='</tbody>';
  tb.innerHTML=h;
}

// ── TABS ──
function showView(view) {
  const views=['class','teacher','full'];
  const ids={class:'classView',teacher:'teacherView',full:'fullView'};
  views.forEach((v,i)=>{
    document.getElementById(ids[v]).classList.toggle('hidden',v!==view);
    document.querySelectorAll('.tab')[i].classList.toggle('active',v===view);
  });
}

// ── PWA INSTALL ──
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  document.getElementById('installBanner').classList.add('show');
});
function triggerInstall() {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; document.getElementById('installBanner').classList.remove('show'); });
}
document.getElementById('installBtn').addEventListener('click', triggerInstall);
window.addEventListener('appinstalled',()=>document.getElementById('installBanner').classList.remove('show'));

// ── SERVICE WORKER ──
if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(console.error));


// ── INIT ──
// तुरुन्तै र setInterval दुवै
try { updateClock(); } catch(e){}
setInterval(function(){
  try { updateClock(); } catch(e){}
}, 1000);
</script>
